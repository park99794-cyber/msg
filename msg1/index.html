<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MBBC WORLD v2026-bac1</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Malgun Gothic',sans-serif; }
body { background:#000; min-height:100vh; }

/* ===== 로딩 ===== */
#loadingDiv {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,0.7);
  justify-content:center; align-items:center;
  color:#fff; font-size:22px;
}

/* ===== 로그인 ===== */
#loginScreen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh;
  background:linear-gradient(160deg,#0f172a,#1e293b);
  padding:40px 30px;
}
.login-top-box {
  width:100%; max-width:400px;
  background:#000;
  border-radius:16px;
  padding:28px 20px 24px;
  display:flex; flex-direction:column; align-items:center;
  margin-bottom:40px;
}
.login-msg-logo { width:80%; max-width:300px; margin-bottom:20px; }
.login-logo { font-family:"Arial Black",sans-serif; font-size:52px; font-weight:900; color:#fff; text-align:center; line-height:1.1; letter-spacing:3px; margin-bottom:0; }
.login-box { width:100%; max-width:400px; }
.login-label { color:#94a3b8; font-size:15px; margin-bottom:10px; }
.login-input { width:100%; padding:18px 20px; background:rgba(30,41,59,0.8); border:1px solid rgba(100,116,139,0.4); border-radius:12px; color:#fff; font-size:26px; font-weight:900; font-family:monospace; letter-spacing:3px; outline:none; margin-bottom:20px; }
.login-input:focus { border-color:#38bdf8; }
.login-input::placeholder { color:#475569; font-size:16px; font-weight:400; }
.login-btn { width:100%; padding:20px; background:linear-gradient(135deg,#0ea5e9,#38bdf8); color:#fff; border:none; border-radius:12px; font-size:20px; font-weight:700; cursor:pointer; letter-spacing:3px; }
.login-error { color:#f87171; font-size:14px; text-align:center; margin-top:14px; display:none; }

/* ===== B 회원 화면 ===== */
#memberScreen { display:none; flex-direction:column; min-height:100vh; }
.container { width:100%; max-width:430px; min-height:100vh; background:#0a0a0a; display:flex; flex-direction:column; align-items:center; padding:4px; gap:5px; margin:0 auto; }
.board-wrap { width:100%; background:#fff; border:1px solid #888; border-radius:4px; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; box-shadow:inset 0 2px 4px rgba(0,0,0,0.3), 0 1px 3px rgba(255,255,255,0.15), 0 2px 8px rgba(0,0,0,0.6); }
#boardSvg { display:block; line-height:0; }

/* 손익 추적 영역 */
.tracker-wrap {
  width:100%; display:flex; gap:4px; align-items:center; padding:0 4px;
  border:1px solid #00bfff;
  border-radius:8px;
  background:#0a0a0a;
  box-shadow:inset 0 1px 4px rgba(0,0,0,0.5), 0 0 6px rgba(0,191,255,0.2);
}
.tracker-input {
  flex:1; padding:8px 10px; background:transparent; border:none;
  border-radius:8px; color:#fff; font-size:28px; font-weight:900;
  text-align:right; outline:none; -moz-appearance:textfield;
  min-width:0;
}
.tracker-input::-webkit-outer-spin-button,
.tracker-input::-webkit-inner-spin-button { -webkit-appearance:none; }
.tracker-input::placeholder { color:#475569; font-size:14px; font-weight:400; }
.tracker-start {
  padding:8px 16px; background:linear-gradient(135deg,#00bfff,#0080ff);
  color:#fff; border:none; border-radius:8px;
  font-size:15px; font-weight:700; cursor:pointer; letter-spacing:1px; flex-shrink:0;
}
.tracker-result {
  width:100%; padding:6px 10px;
  background:#111; border-radius:8px;
  display:flex; justify-content:space-between; align-items:center;
}
.tracker-label { color:#94a3b8; font-size:11px; font-weight:700; }
.tracker-value { font-size:16px; font-weight:900; font-family:monospace; }
.tracker-plus { color:#4ade80; }
.tracker-minus { color:#f87171; }
.tracker-zero { color:#94a3b8; }

.btn-row { display:flex; justify-content:space-around; width:100%; padding:0 20px; gap:14px; align-items:center; }
.btn-bp { width:72px; height:52px; border:none; border-radius:10px; font-size:32px; font-weight:900; color:#fff; cursor:pointer; font-family:"Arial Black",sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.5),inset 0 2px 4px rgba(255,255,255,0.2); transition:transform 0.1s; letter-spacing:-2px; }
.btn-bp:active { transform:scale(0.93); }
.btn-b { background:linear-gradient(145deg,#e00,#900); }
.btn-p { background:linear-gradient(145deg,#00c,#006); }
.mid-btns { display:flex; flex-direction:column; gap:5px; align-items:center; }
.btn-cancel { width:60px; height:38px; background:#444; border:1px solid #666; border-radius:8px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; transition:transform 0.1s; }
.btn-cancel:active { transform:scale(0.93); }
.btn-reset-q { width:60px; height:38px; background:linear-gradient(145deg,#1a1a4a,#0a0a3a); border:2px solid #3a3a8a; border-radius:8px; color:#aab4ff; font-size:12px; font-weight:900; cursor:pointer; transition:transform 0.1s; }
.btn-reset-q:active { transform:scale(0.93); }
.signal-wrap { display:flex; flex-direction:column; align-items:center; gap:5px; width:100%; }
.signal-circle { width:165px; height:165px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:900; color:#fff; font-family:"Arial Black",sans-serif; text-shadow:0 2px 8px rgba(0,0,0,0.5); transition:all 0.3s; }
.signal-red { background:radial-gradient(circle at 35% 35%,#ff4444,#cc0000,#880000); box-shadow:0 0 30px rgba(200,0,0,0.4),inset 0 4px 12px rgba(255,255,255,0.15); border:4px solid #666; }
.signal-blue { background:radial-gradient(circle at 35% 35%,#4444ff,#0000cc,#000088); box-shadow:0 0 30px rgba(0,0,200,0.4),inset 0 4px 12px rgba(255,255,255,0.15); border:4px solid #666; }
@keyframes blinkRed { 0%,100%{box-shadow:0 0 30px rgba(200,0,0,0.4),inset 0 4px 12px rgba(255,255,255,0.15);border-color:#666;} 50%{box-shadow:0 0 60px rgba(255,0,0,1),0 0 100px rgba(255,0,0,0.6);border-color:#f00;} }
@keyframes blinkBlue { 0%,100%{box-shadow:0 0 30px rgba(0,0,200,0.4),inset 0 4px 12px rgba(255,255,255,0.15);border-color:#666;} 50%{box-shadow:0 0 60px rgba(0,0,255,1),0 0 100px rgba(0,0,255,0.6);border-color:#00f;} }
.blink-red { animation:blinkRed 0.7s 5; animation-fill-mode:forwards; }
.blink-blue { animation:blinkBlue 0.7s 5; animation-fill-mode:forwards; }
.btn-free { width:140px; height:40px; background:linear-gradient(145deg,#1a2a4a,#0a1a3a); border:3px solid #334; border-radius:10px; color:#fff; font-size:20px; font-weight:900; font-family:"Arial Black",sans-serif; letter-spacing:3px; cursor:pointer; transition:transform 0.1s; }
.btn-free:active { transform:scale(0.95); }
@keyframes blinkFree { 0%,100%{border-color:#334;box-shadow:0 4px 15px rgba(0,0,0,0.5);} 50%{border-color:#aaf;box-shadow:0 0 30px rgba(100,100,255,0.8);} }
.blink-free { animation:blinkFree 0.5s 5; }
.btn-logout { width:140px; height:40px; background:linear-gradient(145deg,#333,#222); border:1px solid #555; border-radius:10px; color:#aaa; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; }
#patternStatus { display:none; }
</style>
</head>
