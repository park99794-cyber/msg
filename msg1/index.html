<style>

body { background:#000; min-height:100vh; }

/* ===== 로딩 ===== */

/* ── PANEL 1 (수직형 첫화면) ── */

.p1-id-input { width:100%; padding:14px 16px; background:rgba(15,23,42,0.8); border:1px solid rgba(148,163,184,0.3); border-radius:10px; color:#fff; font-size:14px; outline:none; margin-bottom:12px; text-align:center; }
.p1-id-input::placeholder { color:#475569; }

.p1-btn-create { width:100%; padding:14px; background:linear-gradient(135deg,#10b981,#059669); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
.p1-id-list { max-height:150px; overflow-y:auto; margin-top:10px; }
.p1-id-item { display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:#0f172a; border-radius:6px; margin-bottom:4px; }
.p1-id-text { color:#fff; font-size:13px; font-weight:700; font-family:monospace; }
.p1-btn-del { background:#ef4444; color:#fff; border:none; border-radius:4px; padding:4px 10px; font-size:11px; font-weight:700; cursor:pointer; }
.p1-pagination { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
.p1-page-btn { width:28px; height:28px; background:#3b82f6; color:#fff; border:none; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; }
.p1-no-member { color:#64748b; font-size:14px; text-align:center; padding:8px 0; }
.p1-control-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }

.p1-toggle { position:relative; width:52px; height:28px; }

.p1-bet-btn { display:block; width:100%; padding:22px; background:#000; color:#fff; border:none; font-size:24px; font-weight:900; letter-spacing:4px; cursor:pointer; text-align:center; flex-shrink:0; }

/* ── PANEL 3 (설정2: 11~20번) ── */

/* 실시간 열 */

.p2-c-input { width:88px; background:transparent; border:none; border-bottom:2px solid rgba(255,255,255,0.6); color:#fff; font-size:15px; font-weight:900; text-align:center; outline:none; -moz-appearance:textfield; }

.p2-prev:hover { color:#e2e8f0; }

/* 슬롯 열 */
.p2-slot {

.p2-slot-grid { display:flex; flex-direction:column; gap:6px; width:100%; }

.p2-reset-btn { width:100%; padding:10px; background:linear-gradient(135deg,#334155,#1e293b); color:#fff; border:2px solid #4a5568; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:2px; margin-bottom:4px; }
.p2-reset-btn:hover { background:linear-gradient(135deg,#4a5568,#334155); }
.p2-logout-btn { width:100%; padding:10px; background:linear-gradient(135deg,#1e3a8a,#2563eb); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:2px; }

/* 베팅금설정 열 (10행 × 4열 - 세트별 독립) */
.p2-bet {

}

.p2-ba-num { color:#556; font-size:11px; font-weight:900; width:16px; text-align:right; flex-shrink:0; }
.p2-ba-inp {

}
.p2-ba-inp::-webkit-outer-spin-button,.p2-ba-inp::-webkit-inner-spin-button { -webkit-appearance:none; }
.p2-ba-inp:focus { outline:none; border-color:#3b82f6; }

/* 행 토글 버튼 */
.row-toggle {

/* 전체 확인 버튼 */
.p2-confirm-all {

/* 우측 (입력그림 + 베팅포지션) */
.p2-right { flex:1; display:flex; flex-direction:column; gap:8px; min-width:0; }

.p2-box-title { color:#fff; font-size:14px; font-weight:900; margin-bottom:8px; letter-spacing:1px; }

.p2-ig-wrap { display:flex; gap:6px; flex:1; }

.p2-bp-wrap { display:flex; gap:6px; flex:1; }
.p2-bp-halves { flex:1; display:flex; gap:10px; }
.p2-bp-half { flex:1; display:flex; flex-direction:column; gap:3px; }
.p2-bp-row { display:flex; gap:3px; align-items:center; }
.p2-bp-cell {
  flex:1; height:26px; min-width:0;

.p2-bp-cell.cb { background:#5a0a0a; border-color:#ef4444; color:#f87171; }

/* 세로 확인 버튼 */
.p2-side-ok {

  padding:14px 7px; align-self:stretch;
  background:linear-gradient(180deg,#334155,#1e293b);

/* 깜빡 애니메이션 */
@keyframes blinkRedA { 0%,100%{box-shadow:0 0 28px rgba(200,0,0,0.4);border-color:#666;} 50%{box-shadow:0 0 60px rgba(255,0,0,1),0 0 100px rgba(255,0,0,0.5);border-color:#f00;} }

/* ===== B 회원 화면 ===== */
#memberScreen { display:none; flex-direction:column; min-height:100vh; }

.btn-row { display:flex; justify-content:space-around; width:100%; padding:0 20px; gap:14px; align-items:center; }
.btn-bp { width:72px; height:52px; border:none; border-radius:10px; font-size:32px; font-weight:900; color:#fff; cursor:pointer; font-family:"Arial Black",sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.5),inset 0 2px 4px rgba(255,255,255,0.2); transition:transform 0.1s; letter-spacing:-2px; }

.btn-b { background:linear-gradient(145deg,#e00,#900); }

.signal-blue { background:radial-gradient(circle at 35% 35%,#4444ff,#0000cc,#000088); box-shadow:0 0 30px rgba(0,0,200,0.4),inset 0 4px 12px rgba(255,255,255,0.15); border:4px solid #666; }
@keyframes blinkRed { 0%,100%{box-shadow:0 0 30px rgba(200,0,0,0.4),inset 0 4px 12px rgba(255,255,255,0.15);border-color:#666;} 50%{box-shadow:0 0 60px rgba(255,0,0,1),0 0 100px rgba(255,0,0,0.6);border-color:#f00;} }

.blink-free { animation:blinkFree 0.5s 5; }
.btn-logout { width:140px; height:40px; background:linear-gradient(145deg,#333,#222); border:1px solid #555; border-radius:10px; color:#aaa; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:1px; }
#patternStatus { display:none; }

/* === AI 모드 모달 스타일 === */
.ai-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; animation: modalFadeIn 0.4s ease;
}

.ai-modal-content {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
  border-radius: 20px; padding: 40px; text-align: center;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
              0 0 0 1px rgba(148, 163, 184, 0.2),
              inset 0 1px 0 rgba(255, 255, 255, 0.1);
  width: 420px; max-width: 90vw;
  position: relative; overflow: hidden;
  animation: modalSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.ai-modal-content::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4);
  animation: shimmer 2s infinite;
}

@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalSlideUp { 
  from { transform: translateY(50px) scale(0.9); opacity: 0; } 
  to { transform: translateY(0) scale(1); opacity: 1; } 
}
@keyframes shimmer {
  0%, 100% { transform: translateX(-100%); }
  50% { transform: translateX(100%); }
}

.ai-icon {
  width: 120px; height: 80px; margin: 0 auto 20px;
  background-repeat: no-repeat; background-position: center; background-size: contain;
  animation: aiIconBlink 0.4s 5; /* 깜빡이기 5번 */
}

.ai-title-en {
  font-family: 'Orbitron', monospace;
  font-size: 28px; font-weight: 700; color: #e2e8f0;
  margin-bottom: 8px; letter-spacing: 1px;
  text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
}

.ai-title-ko {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 18px; font-weight: 500; color: #94a3b8;
  margin-bottom: 30px; letter-spacing: 0.5px;
}

.ai-loading {
  display: none; margin: 20px 0;
}

.ai-loading-bar {
  width: 100%; height: 4px; background: #334155; border-radius: 2px;
  overflow: hidden; margin-bottom: 10px;
}

.ai-loading-fill {
  height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6);
  width: 0%; animation: loadingProgress 3s ease-in-out;
}

@keyframes loadingProgress {
  0% { width: 0%; }
  100% { width: 100%; }
}

.ai-loading-text {
  font-size: 14px; color: #64748b; font-family: monospace;
}

.ai-buttons {
  display: flex; gap: 15px; justify-content: center;
}

.ai-btn {
  padding: 12px 24px; border-radius: 12px; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.3s ease;
  font-size: 16px; position: relative; overflow: hidden;
}

.ai-btn-primary {
  background: linear-gradient(45deg, #3b82f6, #8b5cf6);
  color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

.ai-btn-primary:hover {
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
}

.ai-btn-secondary {
  background: rgba(148, 163, 184, 0.1); color: #e2e8f0;
  border: 1px solid rgba(148, 163, 184, 0.3);
}

.ai-btn-secondary:hover {
  background: rgba(148, 163, 184, 0.2); transform: translateY(-1px);
}
</style>
