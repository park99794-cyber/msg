<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={
  apiKey:"AIzaSyB-hpuvsuxfBEbJ7fL3tjscUJRJL13hztA",
  authDomain:"mbbc-movie.firebaseapp.com",
  projectId:"mbbc-movie",
  storageBucket:"mbbc-movie.firebasestorage.app",
  messagingSenderId:"915982695424",
  appId:"1:915982695424:web:9ab504e302c8bc1b012ce5"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const COL_MEM='bac1_members';
const COL_SES='bac1_sessions';
const COL_SIG='bac1_signal';
const COL_CFG='bac1_config';

// A → Firebase 수동 신호
window.fbSendSignal=async function(type,amount){
  try{await db.collection(COL_SIG).doc('current').set({type,amount,timestamp:Date.now()});}
  catch(e){console.error('신호전송 오류:',e);}
};

// B: 실시간 수동 신호 수신
function startSignalListener(){
  db.collection(COL_SIG).doc('current').onSnapshot(function(snap){
    if(!snap.exists)return;
    var d=snap.data();
    if(Date.now()-d.timestamp>5000)return;
    showSignal(d.type,d.amount);
  });
}

// B: 설정 실시간 수신 (A가 꺼도 Firebase에서 로드)
function loadBConfig(d){
  var ig=d.ig||[], bp=d.bp||[], ba=d.ba||[];
  window.igPatterns=ig.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  window.bpPositions=bp.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  // 세트별 베팅금액 (ba가 문자열 배열이면 per-set, 숫자 배열이면 legacy global)
  if(Array.isArray(ba) && typeof ba[0]==='string'){
    // 새 포맷: 세트별 ["10000-20000-40000-80000", ...]
    window.betAmountsPerSet=ba.map(function(s){
      if(!s||s.length===0) return [0,0,0,0];
      return s.split('-').map(Number);
    });
  } else {
    // 구 포맷: 전역 [10000, 20000, 40000, 80000]
    var globalAmt=Array.isArray(ba)?ba:[0,0,0,0];
    window.betAmountsPerSet=new Array(10).fill(globalAmt);
  }
  // ※ bState 리셋 제거 - Firebase 재연결 시 베팅 상태 초기화 방지
}

function startConfigListener(){
  // 설정1 (1~10번)
  var ref=db.collection(COL_CFG).doc('settings');
  ref.get().then(function(snap){if(snap.exists)loadBConfig(snap.data());});
  ref.onSnapshot(function(snap){if(snap.exists)loadBConfig(snap.data());});
  // 설정2 (11~20번)
  var ref2=db.collection(COL_CFG).doc('settings2');
  ref2.get().then(function(snap){if(snap.exists)loadBConfig2(snap.data());});
  ref2.onSnapshot(function(snap){if(snap.exists)loadBConfig2(snap.data());});
  // 설정3 (21~30번)
  var ref3=db.collection(COL_CFG).doc('settings3');
  ref3.get().then(function(snap){if(snap.exists)loadBConfig3(snap.data());});
  ref3.onSnapshot(function(snap){if(snap.exists)loadBConfig3(snap.data());});
}

function loadBConfig2(d){
  var ig=d.ig||[], bp=d.bp||[], ba=d.ba||[];
  var igPats=ig.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  var bpPos=bp.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  var baPerSet;
  if(Array.isArray(ba)&&typeof ba[0]==='string'){
    baPerSet=ba.map(function(s){return s?s.split('-').map(Number):[0,0,0,0];});
  } else {
    baPerSet=new Array(10).fill([0,0,0,0]);
  }
  // 설정1 뒤에 붙이기 (index 10~19)
  var pats=window.igPatterns||new Array(10).fill(null);
  var pos=window.bpPositions||new Array(10).fill(null);
  var amts=window.betAmountsPerSet||new Array(10).fill([0,0,0,0]);
  window.igPatterns=pats.slice(0,10).concat(igPats);
  window.bpPositions=pos.slice(0,10).concat(bpPos);
  window.betAmountsPerSet=amts.slice(0,10).concat(baPerSet);
}

function loadBConfig3(d){
  var ig=d.ig||[], bp=d.bp||[], ba=d.ba||[];
  var igPats=ig.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  var bpPos=bp.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  var baPerSet;
  if(Array.isArray(ba)&&typeof ba[0]==='string'){
    baPerSet=ba.map(function(s){return s?s.split('-').map(Number):[0,0,0,0,0,0];});
  } else {
    baPerSet=new Array(10).fill([0,0,0,0,0,0]);
  }
  // 설정2 뒤에 붙이기 (index 20~29)
  var pats=window.igPatterns||new Array(20).fill(null);
  var pos=window.bpPositions||new Array(20).fill(null);
  var amts=window.betAmountsPerSet||new Array(20).fill([0,0,0,0,0,0]);
  window.igPatterns=pats.slice(0,20).concat(igPats);
  window.bpPositions=pos.slice(0,20).concat(bpPos);
  window.betAmountsPerSet=amts.slice(0,20).concat(baPerSet);
}

// 기기 ID
function getDeviceId(){
  var id=localStorage.getItem('mbbc_bac1_device');
  if(!id){id='BAC-'+Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,9);localStorage.setItem('mbbc_bac1_device',id);}
  return id;
}
function showLoading(on){document.getElementById('loadingDiv').style.display=on?'flex':'none';}

// 로그인
window.login=async function(){
  var input=document.getElementById('loginInput').value.trim().toUpperCase();
  var err=document.getElementById('loginError');
  err.style.display='none';
  if(!input){err.textContent='아이디를 입력해주세요';err.style.display='block';return;}
  showLoading(true);
  try{
    var mem=await db.collection(COL_MEM).doc(input).get();
    if(mem.exists){
      var isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if(isMobile){
        var devId=getDeviceId();
        var ses=await db.collection(COL_SES).doc(input).get();
        if(ses.exists&&ses.data().deviceId&&ses.data().deviceId!==devId){
          err.textContent='이미 다른 기기에서 접속 중입니다';err.style.display='block';showLoading(false);return;
        }
        await db.collection(COL_SES).doc(input).set({deviceId:devId,loginTime:new Date().toISOString()});
      }
      window.currentUser={id:input,role:'member'};
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('memberScreen').style.display='flex';
      loadFromStorage(); drawBoard();
      startSignalListener(); startConfigListener();
    } else {
      err.textContent='등록되지 않은 아이디입니다';err.style.display='block';
    }
  }catch(e){err.textContent='오류: '+e.message;err.style.display='block';}
  showLoading(false);
};
document.getElementById('loginInput').addEventListener('keydown',function(e){if(e.key==='Enter')window.login();});


</script>
