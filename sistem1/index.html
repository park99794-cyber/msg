.p2-bp-row { display:flex; gap:3px; align-items:center; }

.btn-row { display:flex; justify-content:space-around; width:100%; padding:0 20px; gap:14px; align-items:center; }
.btn-bp { width:72px; height:52px; border:none; border-radius:10px; font-size:32px; font-weight:900; color:#fff; cursor:pointer; font-family:"Arial Black",sans-serif; box-shadow:0 4px 14px rgba(0,0,0,0.5),inset 0 2px 4px rgba(255,255,255,0.2); transition:transform 0.1s; letter-spacing:-2px; }

.blink-free { animation:blinkFree 0.5s 5; }

/* === AI 모드 모달 스타일 === */
.ai-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; animation: modalFadeIn 0.4s ease;
}

.ai-modal-content {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
  border-radius: 20px; padding: 40px; text-align: center;
  box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 
              0 0 0 1px rgba(148, 163, 184, 0.2),
              inset 0 1px 0 rgba(255, 255, 255, 0.1);
  width: 420px; max-width: 90vw;
  position: relative; overflow: hidden;
  animation: modalSlideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.ai-modal-content::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #3b82f6, #8b5cf6, #06b6d4);
  animation: shimmer 2s infinite;
}

@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalSlideUp { 
  from { transform: translateY(50px) scale(0.9); opacity: 0; } 
  to { transform: translateY(0) scale(1); opacity: 1; } 
}
@keyframes shimmer {
  0%, 100% { transform: translateX(-100%); }
  50% { transform: translateX(100%); }
}

.ai-icon {
  width: 120px; height: 80px; margin: 0 auto 20px;
  background-repeat: no-repeat; background-position: center; background-size: contain;

}

}

  0% { width: 0%; }
  100% { width: 100%; }
}

}

.ai-buttons {

}

.ai-btn {

  border: none; cursor: pointer; transition: all 0.3s ease;
  font-size: 16px; position: relative; overflow: hidden;
}

.ai-btn-primary {
  background: linear-gradient(45deg, #3b82f6, #8b5cf6);
  color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
}

.ai-btn-primary:hover {
  transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
}

.ai-btn-secondary {
  background: rgba(148, 163, 184, 0.1); color: #e2e8f0;
  border: 1px solid rgba(148, 163, 184, 0.3);
}

.ai-btn-secondary:hover {
  background: rgba(148, 163, 184, 0.2); transform: translateY(-1px);
}

function startSignalListener(){

/* ===== 설정 수신 ===== */
function loadBConfig(d,offset){
  var ig=d.ig||[],bp=d.bp||[],ba=d.ba||[],ar=d.ar||[];
  ig.forEach(function(s,i){window.igPatterns[offset+i]=(s&&s.length>0)?s.split('-'):null;});
  bp.forEach(function(s,i){window.bpPositions[offset+i]=(s&&s.length>0)?s.split('-'):null;});
  ar.forEach(function(v,i){activeRows[offset+i]=(v===1||v===true);});
  ba.forEach(function(s,i){
    var idx=offset+i;
    if(typeof s==='string'&&s.length>0){
      window.betAmountsPerStage[idx]=s.split('-').map(Number).filter(function(x){return x>0;});
    }else{window.betAmountsPerStage[idx]=[];}
  });
  recalcMaxStage();
}
var maxConfiguredStage=1;
function recalcMaxStage(){
  var max=0;
  var arr=window.betAmountsPerStage||[];
  for(var i=0;i<arr.length;i++){
    if(arr[i]&&arr[i].length>0) max=i+1;
  }
  maxConfiguredStage=Math.max(max,1);
}
function startConfigListener(){
  var r1=db.collection(COL_CFG).doc('settings');
  r1.get().then(function(s){if(s.exists)loadBConfig(s.data(),0);});
  r1.onSnapshot(function(s){if(s.exists)loadBConfig(s.data(),0);});
  var r2=db.collection(COL_CFG).doc('settings2');
  r2.get().then(function(s){if(s.exists)loadBConfig(s.data(),10);});
  r2.onSnapshot(function(s){if(s.exists)loadBConfig(s.data(),10);});
  var r3=db.collection(COL_CFG).doc('settings3');
  r3.get().then(function(s){if(s.exists)loadBConfig(s.data(),20);});
  r3.onSnapshot(function(s){if(s.exists)loadBConfig(s.data(),20);});
  var r4=db.collection(COL_CFG).doc('settings4');
  r4.get().then(function(s){if(s.exists)loadBConfig(s.data(),30);});
  r4.onSnapshot(function(s){if(s.exists)loadBConfig(s.data(),30);});
  var r5=db.collection(COL_CFG).doc('settings5');
  r5.get().then(function(s){if(s.exists)loadBConfig(s.data(),40);});
  r5.onSnapshot(function(s){if(s.exists)loadBConfig(s.data(),40);});
}
/* ===== inputResult 핵심로직 오버라이드 ===== */
/* 1~5단계: 전체그림 / 6+단계: 빨간표시그림만 / 설정횟수맞으면1단계 / 최대단계실패→자동1단계 */
function inputResult(res){
  results.push(res);
  drawBoard();
  saveToStorage();
  calcTrackerResult(res);
  var btn=res==='B'?document.querySelector('.btn-b'):document.querySelector('.btn-p');
  if(btn){btn.style.transform='scale(0.9)';setTimeout(function(){btn.style.transform='';},150);}
  var bpPos=window.bpPositions||[];
  var igPats=window.igPatterns||[];
  var hasAny=igPats.some(function(p){return p&&p.length>0;});
  if(!hasAny)return;
  function doNext(){
    var m=findPatternMatch();
    if(m>=0&&bpPos[m]&&bpPos[m].length>0){
      bActiveSet=m;bBetStep=0;bState='betting';
      showSignal(bpPos[m][0],getStageAmt(0));
    }else{
      bState='free';bActiveSet=-1;bBetStep=0;
      showSignal('FREE',0);
    }
  }
  if(bState==='betting'){
    var seq=bpPos[bActiveSet];
    if(!seq||bBetStep>=seq.length){
      bState='free';bActiveSet=-1;bBetStep=0;showSignal('FREE',0);return;
    }
    if(res===seq[bBetStep]){
      bBetStep++;
      if(bBetStep>=seq.length){
        /* 설정횟수 모두 맞음 → 무조건 1단계 복귀 */
        var prev=currentStage;
        currentStage=1;
        if(prev>=6)setTimeout(function(){showAIModeDeactivation();},800);
        bState='free';bActiveSet=-1;bBetStep=0;
        doNext();
      }else{
        showSignal(seq[bBetStep],getStageAmt(bBetStep));
      }
    }else{
      /* 틀림 → 다음단계 */
      var prev=currentStage;
      currentStage++;
      if(currentStage>maxConfiguredStage){
        /* 최대단계 모두실패 → 자동 1단계 초기화 */
        currentStage=1;
        bState='free';bActiveSet=-1;bBetStep=0;
        doNext();
        return;
      }
      if(prev===5&&currentStage===6)setTimeout(function(){showAIModeActivation();},1000);
      bState='free';bActiveSet=-1;bBetStep=0;
      doNext();
    }
  }else{
    doNext();
  }
}

/* ===== 기기 ID ===== */
function getDeviceId(){
  var id=localStorage.getItem('mbbc_deviceId');
  if(!id){id='dev-'+Date.now().toString(36)+'-'+Math.random().toString(36).substr(2,7);localStorage.setItem('mbbc_deviceId',id);}
  return id;
}
function showLoading(on){document.getElementById('loadingDiv').style.display=on?'flex':'none';}

/* ===== 로그인 ===== */
window.login=async function(){
  var input=document.getElementById('loginInput').value.trim().toUpperCase();
  var err=document.getElementById('loginError');
  err.style.display='none';
  if(!input){err.textContent='아이디를 입력해주세요';err.style.display='block';return;}
  showLoading(true);
  try{
    var snap=await db.collection(COL_MEM).doc(input).get();
    if(snap.exists){
      var did=getDeviceId();
      var isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      var ss=await db.collection(COL_SES).doc(input).get();
      if(ss.exists){
        var sd=ss.data();
        if(isMobile){if(sd.mobileDeviceId&&sd.mobileDeviceId!==did){err.textContent='다른 휴대폰에서 이미 로그인 중입니다';err.style.display='block';showLoading(false);return;}}
        else{if(sd.pcDeviceId&&sd.pcDeviceId!==did){err.textContent='다른 PC에서 이미 로그인 중입니다';err.style.display='block';showLoading(false);return;}}
      }
      var upd={loginTime:new Date().toISOString()};
      if(isMobile)upd.mobileDeviceId=did; else upd.pcDeviceId=did;
      await db.collection(COL_SES).doc(input).set(upd,{merge:true});
      window.currentUser={id:input,role:'member'};
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('memberScreen').style.display='flex';
      loadFromStorage();drawBoard();startSignalListener();startConfigListener();
    }else{err.textContent='등록되지 않은 아이디입니다';err.style.display='block';}
  }catch(e){err.textContent='오류: '+e.message;err.style.display='block';}
  showLoading(false);
};
document.getElementById('loginInput').addEventListener('keypress',function(e){if(e.key==='Enter')window.login();});

/* Start 버튼 활성화 색상 */
window.startTracker=function(){
  var el=document.getElementById('startAmt');
  var amt=parseInt(el?el.value:0)||0;
  if(amt<=0){alert('시작 금액을 입력해주세요');return;}
  if(amt>100000000)amt=100000000;
  trackerStart=amt;
  trackerCurrent=amt;
  trackerBets=[];
  trackerActive=true;
  if(el)el.value=amt;
  var btn=document.querySelector('.tracker-start');
  if(btn){btn.style.background='linear-gradient(135deg,#ff6600,#ff3300)';}
};
