function saveAll(){

// A 접속 시 기존 Firebase 설정 불러오기 (화면에 표시)
function loadAdminSettings(){
  db.collection(COL_CFG).doc('settings').get().then(function(snap){
    if(!snap.exists)return;
    var d=snap.data();
    // 입력그림 복원
    var ig=d.ig||[];
    for(var r=0;r<IG_R;r++){
      var s=ig[r]||'';
      var arr=s?s.split('-'):[];
      for(var c=0;c<IG_C;c++) igGrid[r][c]=(c<arr.length&&arr[c])?arr[c]:null;
    }
    renderIgGrid();
    // 베팅포지션 복원
    var bp=d.bp||[];
    for(var r=0;r<BP_R;r++){
      var s=bp[r]||'';
      var arr=s?s.split('-'):[];
      for(var c=0;c<BP_C;c++) bpGrid[r][c]=(c<arr.length&&arr[c])?arr[c]:null;
    }
    renderBpGrid();
    // 베팅금 복원 (세트별)
    var ba=d.ba||[];
    for(var r=0;r<BA_R;r++){
      var s=typeof ba[r]==='string'?ba[r]:'';
      var arr=s?s.split('-').map(Number):[0,0,0,0];
      for(var c=0;c<BA_C;c++){
        baGrid[r][c]=arr[c]||0;
        var el=document.getElementById('ba-'+r+'-'+c);
        if(el) el.value=arr[c]||'';
      }
    }
    // 슬롯 복원
    var igArr=d.ig||[];
    for(var i=0;i<10;i++){
      var dot=document.getElementById('slot'+i);
      if(dot){
        if(igArr[i]&&igArr[i].length>0) dot.classList.add('active');
        else dot.classList.remove('active');
      }
    }
  }).catch(function(e){console.log('설정 로드 오류:',e);});
}

function initBpGrid3(){

function toggleBpCell3(r,c){
  var v=bpGrid3[r][c];
  bpGrid3[r][c]=(v===null)?'P':(v==='P')?'B':null;
  renderBpGrid3();
}
function renderBpGrid3(){
  for(var r=0;r<BP_R3;r++)for(var c=0;c<BP_C3;c++){

// 베팅금3
var BA_R3=10, BA_C3=6;
var baGrid3=[];
for(var r=0;r<BA_R3;r++) baGrid3.push([0,0,0,0,0,0]);

function initBaGrid3(){
  var container=document.getElementById('baGrid3');

  container.innerHTML='';
  for(var r=0;r<BA_R3;r++){
    var row=document.createElement('div');
    row.className='p2-ba-row';
    var num=document.createElement('span');

    num.textContent=r+21;

    for(var c=0;c<BA_C3;c++){
      var inp=document.createElement('input');
      inp.type='number';
      inp.className='p2-ba-inp';
      inp.id='ba3-'+r+'-'+c;
      inp.placeholder='-';
      if(baGrid3[r][c]) inp.value=baGrid3[r][c];
      inp.addEventListener('input',(function(rr,cc){return function(){baGrid3[rr][cc]=parseInt(this.value)||0;};})(r,c));
      row.appendChild(inp);
    }
    container.appendChild(row);
  }
}

function getBaArr3(){
  var arr=[];
  for(var r=0;r<BA_R3;r++){
    var vals=[];
    for(var c=0;c<BA_C3;c++){
      var el=document.getElementById('ba3-'+r+'-'+c);
      vals.push(el?parseInt(el.value)||0:baGrid3[r][c]||0);
    }
    arr.push(vals.join('-'));

  return arr;
}

function saveAll3(){
  var igArr=[];
  for(var r=0;r<IG_R3;r++){
    var cells=igGrid3[r].filter(function(v){return v!==null;});

  for(var r=0;r<BP_R3;r++){

    var bpCnt=bpArr.filter(function(s){return s;}).length;

  }).catch(function(e){alert('❌ 저장 실패: '+e.message);});
}

function loadAdminSettings3(){
  db.collection(COL_CFG).doc('settings3').get().then(function(snap){
    if(!snap.exists)return;
    var d=snap.data();
    var ig=d.ig||[];
    for(var r=0;r<IG_R3;r++){

      var s=bp[r]||'';

// 회원 관리
var idList=[],currentPage=1,perPage=5;
async function loadAdminMembers(){
  try{
    var snap=await db.collection(COL_MEM).get();
    idList=[];
    snap.forEach(function(d){idList.push(d.id);});
    idList.sort(); renderIdList();
  }catch(e){console.error(e);}
}
window.renderIdList=function(){
  var list=document.getElementById('idList');
  var pg=document.getElementById('pagination');
  if(!list)return;
  var tot=Math.ceil(idList.length/perPage), st=(currentPage-1)*perPage;
  if(idList.length===0){list.innerHTML='<div class="p1-no-member">등록된 회원이 없습니다</div>';}
  else{
    list.innerHTML='';
    idList.slice(st,st+perPage).forEach(function(id){
      var div=document.createElement('div'); div.className='p1-id-item';
      div.innerHTML='<span class="p1-id-text">'+id+'</span><button class="p1-btn-del" onclick="deleteMember(\''+id+'\')">삭제</button>';
      list.appendChild(div);
    });
  }
  if(!pg)return; pg.innerHTML='';
  for(var i=1;i<=Math.max(1,tot);i++){
    var btn=document.createElement('button'); btn.className='p1-page-btn'; btn.textContent=i;
    btn.onclick=(function(n){return function(){currentPage=n;renderIdList();};})(i);
    pg.appendChild(btn);
  }
};
window.createId=async function(){
  var el=document.getElementById('idInput');
  var raw=el?el.value.trim().toUpperCase():'';
  var newId=raw||'MBBC-'+Math.random().toString(36).substr(2,5).toUpperCase();
  if(idList.includes(newId)){alert('이미 존재하는 ID입니다');return;}
  try{
    await db.collection(COL_MEM).doc(newId).set({createdAt:new Date().toISOString()});
    if(el)el.value='';
    alert('생성완료: '+newId);
    await loadAdminMembers();
  }catch(e){alert('생성 오류: '+e.message);}
};
window.deleteMember=async function(id){
  if(!confirm(id+' 를 삭제하시겠습니까?'))return;
  try{await db.collection(COL_MEM).doc(id).delete();await loadAdminMembers();}
  catch(e){alert('삭제 오류');}
};

// B: 설정 실시간 수신 (A가 꺼도 Firebase에서 로드)
function loadBConfig(d){
  var ig=d.ig||[], bp=d.bp||[], ba=d.ba||[];
  window.igPatterns=ig.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  window.bpPositions=bp.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  // 세트별 베팅금액 (ba가 문자열 배열이면 per-set, 숫자 배열이면 legacy global)
  if(Array.isArray(ba) && typeof ba[0]==='string'){
    // 새 포맷: 세트별 ["10000-20000-40000-80000", ...]
    window.betAmountsPerSet=ba.map(function(s){
      if(!s||s.length===0) return [0,0,0,0];
      return s.split('-').map(Number);
    });
  } else {
    // 구 포맷: 전역 [10000, 20000, 40000, 80000]
    var globalAmt=Array.isArray(ba)?ba:[0,0,0,0];
    window.betAmountsPerSet=new Array(10).fill(globalAmt);
  }
  // ※ bState 리셋 제거 - Firebase 재연결 시 베팅 상태 초기화 방지
}

function startConfigListener(){
  // 설정1 (1~10번)
  var ref=db.collection(COL_CFG).doc('settings');

  ref.onSnapshot(function(snap){if(snap.exists)loadBConfig(snap.data());});
  // 설정2 (11~20번)
  var ref2=db.collection(COL_CFG).doc('settings2');

}

function loadBConfig2(d){
  var ig=d.ig||[], bp=d.bp||[], ba=d.ba||[];
  var igPats=ig.map(function(s){return(s&&s.length>0)?s.split('-'):null;});
  var bpPos=bp.map(function(s){return(s&&s.length>0)?s.split('-'):null;});

  if(Array.isArray(ba)&&typeof ba[0]==='string'){
    baPerSet=ba.map(function(s){return s?s.split('-').map(Number):[0,0,0,0];});

    baPerSet=new Array(10).fill([0,0,0,0]);

window.login=async function(){
  var input=document.getElementById('loginInput').value.trim().toUpperCase();
  var err=document.getElementById('loginError');
  err.style.display='none';
  if(!input){err.textContent='아이디를 입력해주세요';err.style.display='block';return;}
  showLoading(true);
  try{
    if(ADMIN_IDS.includes(input)){
      window.currentUser={id:input,role:'admin'};
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('adminScreen').style.display='block';
      showPanel1();
      loadAdminMembers();
    } else {
      var mem=await db.collection(COL_MEM).doc(input).get();
      if(mem.exists){
        var isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if(isMobile){
          var devId=getDeviceId();
          var ses=await db.collection(COL_SES).doc(input).get();
          if(ses.exists&&ses.data().deviceId&&ses.data().deviceId!==devId){
            err.textContent='이미 다른 기기에서 접속 중입니다';err.style.display='block';showLoading(false);return;
          }
          await db.collection(COL_SES).doc(input).set({deviceId:devId,loginTime:new Date().toISOString()});
        }
        window.currentUser={id:input,role:'member'};
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('memberScreen').style.display='flex';
        loadFromStorage(); drawBoard();
        startSignalListener(); startConfigListener();
      } else {
        err.textContent='등록되지 않은 아이디입니다';err.style.display='block';
      }
    }
  }catch(e){err.textContent='오류: '+e.message;err.style.display='block';}
  showLoading(false);
};
